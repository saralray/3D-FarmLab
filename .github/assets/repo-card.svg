<svg width="440" height="190" viewBox="0 0 440 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="3D-FarmLab repo stat card">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#149eca"/>
      <stop offset="100%" stop-color="#0d6e91"/>
    </linearGradient>
    <style>
      .title   { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1a1f24; }
      .sub     { font: 400 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #57606a; }
      .stat    { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #24292f; }
      .dot     { fill: #149eca; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="439" height="189" rx="10" fill="#ffffff" stroke="#e4e2e2"/>
  <rect x="0.5" y="0.5" width="5" height="189" rx="2.5" fill="url(#accent)"/>

  <text x="26" y="36" class="title">3D-FarmLab</text>
  <text x="26" y="56" class="sub">Self-hosted 3D-print farm dashboard</text>

  <line x1="26" y1="68" x2="414" y2="68" stroke="#e4e2e2" stroke-width="1"/>

  <circle cx="30" cy="90" r="3" class="dot"/>
  <text x="42" y="94" class="stat">7 orchestrated Docker services behind nginx</text>

  <circle cx="30" cy="116" r="3" class="dot"/>
  <text x="42" y="120" class="stat">React · TypeScript · Node.js · Go · PostgreSQL</text>

  <circle cx="30" cy="142" r="3" class="dot"/>
  <text x="42" y="146" class="stat">Prometheus + Grafana observability built in</text>

  <circle cx="30" cy="168" r="3" class="dot"/>
  <text x="42" y="172" class="stat">Licensed under GPL-3.0</text>
</svg>
