name: Build and Push Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    env:
      # Forks set DOCKERHUB_USERNAME in repo secrets; it's the push registry
      # prefix (and the Kubernetes image prefix when you deploy manually).
      IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          : "${IMAGE_PREFIX:?DOCKERHUB_USERNAME secret is not set}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "DOCKERHUB_TOKEN secret is not set"; exit 1; }

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build web image
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg VITE_PUBLIC_VIEWER_MODE='${{ vars.PUBLIC_VIEWER_MODE || 'false' }}' \
            -t "${IMAGE_PREFIX}/printfarm-web:latest" .

      - name: Build poller image
        run: |
          docker build \
            -f Dockerfile.poller \
            -t "${IMAGE_PREFIX}/printfarm-poller:latest" .

      - name: Build nginx image
        run: |
          docker build \
            -f Dockerfile.nginx \
            -t "${IMAGE_PREFIX}/printfarm-nginx:latest" .

      - name: Build exporter image
        run: |
          docker build \
            -f Dockerfile.exporter \
            -t "${IMAGE_PREFIX}/printfarm-exporter:latest" .

      - name: Push images
        run: |
          docker push "${IMAGE_PREFIX}/printfarm-web:latest"
          docker push "${IMAGE_PREFIX}/printfarm-poller:latest"
          docker push "${IMAGE_PREFIX}/printfarm-nginx:latest"
          docker push "${IMAGE_PREFIX}/printfarm-exporter:latest"
