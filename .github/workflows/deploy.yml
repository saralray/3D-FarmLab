name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build web image
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg VITE_PUBLIC_VIEWER_MODE=false \
            --build-arg VITE_GOOGLE_FORM_URL='https://docs.google.com/forms/d/e/1FAIpQLSdRR27bQDytT0xJNa2z6YSqksiclxtgoKxbaY-uANlAZGgeag/viewform?usp=dialog' \
            --build-arg VITE_GOOGLE_SHEET_QUEUE_URL='https://docs.google.com/spreadsheets/d/13CZxAD8lctUtJEcVHH-qUHKNIJY0ENxcxPP-DwNgelE/edit?usp=sharing' \
            -t saralray/printfarm-web:latest .

      - name: Push web image
        run: |
          docker push saralray/printfarm-web:latest

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/web -n printfarm