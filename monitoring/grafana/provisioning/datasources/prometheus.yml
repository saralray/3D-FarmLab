# Grafana datasource provisioning for the Print Farm Prometheus.
#
# Mount this file into your (separately run) Grafana so the datasource is created
# automatically on startup:
#
#   /etc/grafana/provisioning/datasources/prometheus.yml
#
# Docker example (add to your Grafana's `docker run` or compose):
#   -v /path/to/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
#
# IMPORTANT — set `url` to wherever YOUR Grafana can reach this Prometheus.
# In Docker Compose, Prometheus runs under the /prometheus route prefix and is
# no longer published on its own host port — it is served via nginx instead:
#   - Grafana on the same Docker network:   http://prometheus:9090/prometheus
#     (bypasses nginx entirely — no auth needed, as configured below.)
#   - Grafana on another host (via nginx):  http://<this-host>:8080/prometheus
#     Prometheus has no auth of its own (H-1). If PROMETHEUS_BASIC_AUTH_PASSWORD
#     is set on the nginx service, this path requires HTTP Basic Auth — uncomment
#     basicAuth below, set basicAuthUser to match PROMETHEUS_BASIC_AUTH_USER, and
#     set secureJsonData.basicAuthPassword to PROMETHEUS_BASIC_AUTH_PASSWORD
#     (Grafana encrypts it at rest — don't put it in `url`). If that env var is
#     left unset, nginx serves /prometheus with no auth at all — leave basicAuth
#     commented out in that case.
# (In a plain Kubernetes deploy where Prometheus serves at root, drop /prometheus.)
apiVersion: 1

datasources:
  - name: Print Farm Prometheus
    uid: printfarm-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: false
    editable: true
    # basicAuth: true
    # basicAuthUser: admin
    jsonData:
      httpMethod: POST
      # Matches the exporter scrape interval so $__rate_interval behaves well.
      timeInterval: 15s
    # secureJsonData:
    #   basicAuthPassword: "$PROMETHEUS_BASIC_AUTH_PASSWORD"
