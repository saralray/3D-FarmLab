# Prometheus scrape configuration for 3D-FarmLab.
#
# The print-farm metrics come from the `exporter` service (a read-only view of
# the PostgreSQL data). `exporter` resolves on both the Docker Compose network
# and the Kubernetes namespace, so this file is shared by both deployments.
global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

# Alerting rules (poller stalled, exporter scrape failing, web error rate/down).
# Mounted alongside this file in docker-compose; the path is relative to the
# config directory (/etc/prometheus). Wire an Alertmanager under `alerting:` to
# actually deliver them — the rules also surface on the /prometheus/alerts page.
rule_files:
  - alerts.yml

scrape_configs:
  # Printer state (printfarm_printer_online/printing/pause/error/offline, temps,
  # progress) is scraped to track the poller in near-real time. The exporter
  # opens a fresh DB connection and reads the tables on every scrape, and the
  # poller only refreshes the DB every PRINTER_POLL_INTERVAL_MS (2s default), so
  # scraping faster than that just doubles DB load for identical data. Match the
  # poll cadence.
  - job_name: printfarm
    scrape_interval: 2s
    scrape_timeout: 2s
    static_configs:
      - targets: ["exporter:9180"]

  # The web tier's own request metrics (printfarm_web_http_*). Scraped straight
  # from the web container over the internal network — nginx returns 404 for
  # /metrics, so these never reach the public site. 5s (rather than the 2s
  # printer-poll cadence above) balances the live throughput gauges
  # (printfarm_web_bytes_out_live/_bytes_in_live, sampled server-side every
  # 2s) looking reasonably real-time in Grafana against scrape overhead —
  # request rate/latency don't need 2s resolution.
  - job_name: printfarm_web
    scrape_interval: 5s
    scrape_timeout: 4s
    static_configs:
      - targets: ["web:5173"]

  - job_name: prometheus
    # In Docker Compose, Prometheus runs with --web.route-prefix=/prometheus, so
    # its own /metrics endpoint moves under that prefix. (Harmless in Kubernetes,
    # where Prometheus serves at root — adjust there if you scrape it.)
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]
