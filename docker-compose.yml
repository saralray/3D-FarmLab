services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional Redis acceleration layer (sessions, login rate-limit, live-telemetry
  # cache). Not published to the host — only the web and poller reach it over the
  # internal network. AOF persistence so a restart keeps live sessions/counters.
  # The whole stack runs fine without it: leave REDIS_URL empty in .env to disable
  # (web/poller fall back to Postgres/in-memory) and this service idles harmlessly.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_PUBLIC_VIEWER_MODE: ${VITE_PUBLIC_VIEWER_MODE:-false}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # Non-blocking: the Redis client connects lazily and tolerates an outage, so
      # web never waits on Redis health — this only nudges start ordering.
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      # Postgres connection-pool sizing and safety timeouts (ms; 0 disables a
      # timeout). Size the pool to the web-replica count vs Postgres max_connections.
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_POOL_IDLE_MS: ${DATABASE_POOL_IDLE_MS:-30000}
      DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-5000}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_IDLE_TX_TIMEOUT_MS: ${DATABASE_IDLE_TX_TIMEOUT_MS:-60000}
      # Optional Redis acceleration. Empty = disabled (falls back to Postgres /
      # in-memory). Reaches the redis service over the internal compose network.
      REDIS_URL: ${REDIS_URL:-}
      # Observability. LOG_LEVEL (debug|info|warn|error); LOG_FORMAT (text|json —
      # use json to ship structured logs to an aggregator); LOG_HTTP (sample|all|
      # off) controls the per-request access log. Request metrics are always at
      # the internal /metrics (scraped by Prometheus, 404 on the public site).
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LOG_HTTP: ${LOG_HTTP:-sample}
      VITE_PUBLIC_VIEWER_MODE: ${VITE_PUBLIC_VIEWER_MODE:-false}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
      # Shared with slicer-proxy: verifies the signed slicer operator-grant token.
      SLICER_GRANT_SECRET: ${SLICER_GRANT_SECRET:-}
      # Mark the login session cookie Secure (set true once served over HTTPS).
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Encrypts printer connection secrets (LAN access codes) at rest. Must be
      # identical across web, slicer-proxy and poller. Empty = stored plaintext.
      PRINTER_SECRET_KEY: ${PRINTER_SECRET_KEY:-}
      # Max size of a model file uploaded through the in-app print-request form
      # (stored in Postgres). The nginx /api/queue/submit body cap should match.
      QUEUE_UPLOAD_MAX_BYTES: ${QUEUE_UPLOAD_MAX_BYTES:-52428800}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      # nginx resolves these upstreams at startup, so they must be up.
      slicer-proxy:
        condition: service_started
      prometheus:
        condition: service_started
    environment:
      # Substituted into nginx/default.conf.template at startup. Default "_"
      # matches any Host header; set a real domain in .env for name-based vhosts.
      SERVER_NAME: ${SERVER_NAME:-_}
    ports:
      - "${HTTP_PORT:-8080}:80"

  poller:
    build:
      context: .
      dockerfile: Dockerfile.poller
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # Non-blocking (see web): the poller's Redis client tolerates an outage.
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      # Postgres connection safety timeouts (ms; 0 disables). Mirror the Node pool.
      DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-5000}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_IDLE_TX_TIMEOUT_MS: ${DATABASE_IDLE_TX_TIMEOUT_MS:-60000}
      # Optional Redis acceleration. Empty = disabled (telemetry stays Postgres-only).
      REDIS_URL: ${REDIS_URL:-}
      PRINTER_POLL_INTERVAL_MS: ${PRINTER_POLL_INTERVAL_MS:-2000}
      PRINTER_REQUEST_TIMEOUT_MS: ${PRINTER_REQUEST_TIMEOUT_MS:-3000}
      PRINTER_OFFLINE_GRACE_SECONDS: ${PRINTER_OFFLINE_GRACE_SECONDS:-30}
      # The poller writes a printer row only when its telemetry changed; this caps
      # how long an unchanged row can go without a write (safety net). 0 = write
      # every cycle (the previous behavior).
      PRINTER_PERSIST_MAX_INTERVAL_MS: ${PRINTER_PERSIST_MAX_INTERVAL_MS:-30000}
      # Refresh concurrency. 0 = auto-size the worker pool to the printer count
      # (capped by _MAX); set an explicit number to pin it. Raise _MAX if cycles
      # overrun the interval with many slow/offline printers.
      PRINTER_POLL_CONCURRENCY: ${PRINTER_POLL_CONCURRENCY:-0}
      PRINTER_POLL_CONCURRENCY_MAX: ${PRINTER_POLL_CONCURRENCY_MAX:-64}
      # Horizontal sharding. Default is a single shard owning every printer. To
      # split the farm across replicas, define one poller service per shard, each
      # with the same POLLER_SHARD_COUNT and a distinct POLLER_SHARD_INDEX (0..N-1).
      POLLER_SHARD_COUNT: ${POLLER_SHARD_COUNT:-1}
      POLLER_SHARD_INDEX: ${POLLER_SHARD_INDEX:-0}
      # Must match the web service: used to decrypt printer secrets read from the DB.
      PRINTER_SECRET_KEY: ${PRINTER_SECRET_KEY:-}
      # Bambu cameras aren't plain HTTP, so the poller grabs their Discord-snapshot
      # frames from the web service's /__printer_webcam/<id>/snapshot.jpg endpoint
      # over the internal network (it speaks the port-6000 / RTSP camera protocols).
      WEB_SNAPSHOT_BASE_URL: ${WEB_SNAPSHOT_BASE_URL:-http://web:5173}

  # Slicer-upload proxy: an OctoPrint-compatible endpoint a slicer (Orca etc.)
  # can push sliced files to. Authenticated with named API keys (managed in
  # Settings → Slicer Upload). Not published to the host — nginx routes /printers/
  # to it over the internal network, so the slicer reaches it on the same domain
  # as the dashboard: http://<domain>/printers/<id>.
  slicer-proxy:
    build:
      context: .
      dockerfile: Dockerfile.slicer-proxy
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      # Shares server/postgres.js with web, so the same pool sizing/timeout knobs apply.
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_POOL_IDLE_MS: ${DATABASE_POOL_IDLE_MS:-30000}
      DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-5000}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_IDLE_TX_TIMEOUT_MS: ${DATABASE_IDLE_TX_TIMEOUT_MS:-60000}
      SLICER_PROXY_PORT: ${SLICER_PROXY_PORT:-8091}
      # Used to redirect a slicer's "Device" tab to the dashboard's printer page.
      HTTP_PORT: ${HTTP_PORT:-8080}
      APP_BASE_URL: ${APP_BASE_URL:-}
      # Shared with web: signs the slicer operator-grant token the device-tab
      # redirect carries. Must match the web service's value exactly.
      SLICER_GRANT_SECRET: ${SLICER_GRANT_SECRET:-}
      # Must match the web service: decrypts the printer secret read from the DB
      # before dispatching the upload to the printer hardware.
      PRINTER_SECRET_KEY: ${PRINTER_SECRET_KEY:-}

  # Read-only Prometheus exporter: exposes the PostgreSQL print-farm data as
  # metrics on :9180/metrics. Not published to the host — Prometheus scrapes it
  # over the internal network, so metrics never reach the public site.
  exporter:
    build:
      context: .
      dockerfile: Dockerfile.go
      args:
        SERVICE: exporter
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      # Bound each scrape query so a slow/locked query fails the scrape fast (0 disables).
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      # If you change this, also update the target in
      # monitoring/prometheus/prometheus.yml.
      EXPORTER_PORT: ${EXPORTER_PORT:-9180}

  # Scrapes the exporter and stores the time series. Not published to the host —
  # nginx serves it under /prometheus on the main site (see default.conf.template).
  # Runs with --web.route-prefix=/prometheus so every route lives under that path.
  # Point Grafana at http://prometheus:9090/prometheus (same network) or
  # http://<host>:${HTTP_PORT:-8080}/prometheus (external).
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    depends_on:
      - exporter
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=/prometheus'
      - '--web.route-prefix=/prometheus'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  prometheus_data:
  redis_data:
