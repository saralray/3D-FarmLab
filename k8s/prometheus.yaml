apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: printfarm
data:
  # Mirrors monitoring/prometheus/prometheus.yml. `exporter` resolves to the
  # exporter Service in this namespace.
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: printfarm
        static_configs:
          - targets: ["exporter:9180"]

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: printfarm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: printfarm
spec:
  replicas: 1

  # Recreate: the ReadWriteOnce PVC can only be mounted by one pod at a time, so
  # the old pod must release it before the new one starts (same reasoning as the
  # postgres Deployment). A RollingUpdate would deadlock on the volume.
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      # The prom/prometheus image runs as uid 65534 (nobody); fsGroup makes the
      # mounted PVC group-writable so Prometheus can create its TSDB.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534

      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus

          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"

            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: printfarm
# ClusterIP: reachable in-cluster as http://prometheus:9090 (e.g. for an
# in-cluster Grafana). To reach it from an external Grafana, change the type to
# NodePort/LoadBalancer or add a route to k8s/ingress.yaml.
spec:
  selector:
    app: prometheus

  ports:
    - port: 9090
      targetPort: 9090
